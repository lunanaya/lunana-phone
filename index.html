* **Track_A (身份/责任轨道):** 包含“血缘亲情、兄长/长辈的保护欲、职业赏识、过命的战友情”。

* **[PHASE-1: 提取与增幅]**

            * Log = "事件权重达标，防线粉碎，允许进入下一阶段。"
        * Else (Event_Weight < Required_Weight):

* **[路人替换测试]**：如果一个长相普通的同性路人对角色做了同样的动作，角色会无视/客套吗？如果是，则对 User 必须执行相同反应。禁止额外脑补。
